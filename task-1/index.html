<!DOCTYPE html>
<html>
<head>
    <title>Education App Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Education App Wireframes</h1>

    <div class="screen">
        <h2>Splash Screen</h2>
        <div class="logo">
    <h1>&lt;/&gt; CODEALPHA</h1>
    <p>Empowering Future Developers</p>
</div>
        <button>Get Started</button>
    </div>

    <div class="screen">
        <h2>Login Screen</h2>
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

    <div class="screen">
        <h2>Home Screen</h2>
        <input type="text" placeholder="Search Course">
        <div class="box">Categories: AI | Web | Data Science</div>
        <div class="box">Featured Courses</div>
    </div>

    <div class="screen">
        <h2>Course Details</h2>
        <div class="box">Course Image</div>
        <p>AI Fundamentals</p>
        <button>Enroll Now</button>
    </div>

    <div class="screen">
        <h2>My Learning</h2>
        <div class="box">AI Fundamentals - 60%</div>
        <div class="box">Python Course - 30%</div>
    </div>

</body>
</html>
